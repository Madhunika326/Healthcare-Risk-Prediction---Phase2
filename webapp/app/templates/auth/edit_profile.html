{% extends "base.html" %}

{% block title %}Edit Profile - Healthcare Risk Prediction{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-6 offset-lg-3">
        <div class="card shadow-lg">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="fas fa-edit"></i> Edit Profile</h4>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('auth.edit_profile') }}">
                    <div class="mb-3">
                        <label for="first_name" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="first_name" name="first_name" 
                               value="{{ user.first_name or '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="last_name" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="last_name" name="last_name" 
                               value="{{ user.last_name or '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" class="form-control" id="age" name="age" 
                               value="{{ user.age or '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="gender" class="form-label">Gender</label>
                        <select class="form-select" id="gender" name="gender">
                            <option value="">-- Select --</option>
                            <option value="Male" {% if user.gender == 'Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if user.gender == 'Female' %}selected{% endif %}>Female</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="residence" class="form-label">Residence</label>
                        <select class="form-select" id="residence" name="residence">
                            <option value="">-- Select --</option>
                            <option value="Urban" {% if user.residence == 'Urban' %}selected{% endif %}>Urban</option>
                            <option value="Rural" {% if user.residence == 'Rural' %}selected{% endif %}>Rural</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                        <a href="{{ url_for('auth.profile') }}" class="btn btn-secondary btn-lg">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
