{% extends "base.html" %}

{% block title %}Login - Healthcare Risk Prediction Platform{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card">
        <span class="eyebrow">User Login</span>
        <h1>Access your assessments</h1>
        <p>Sign in to complete assessments, review your dashboard, and download reports.</p>
        <form method="POST" action="{{ url_for('auth.user_login') }}" class="mt-4">
            <div class="mb-3"><label class="form-label" for="username">Username</label><input class="form-control form-control-lg" id="username" name="username" required autofocus></div>
            <div class="mb-3"><label class="form-label" for="password">Password</label><input class="form-control form-control-lg" id="password" name="password" type="password" required></div>
            <div class="form-check mb-3"><input class="form-check-input" id="remember" name="remember" type="checkbox"><label class="form-check-label" for="remember">Remember me</label></div>
            <button class="btn btn-accent btn-lg w-100" type="submit">Login</button>
        </form>
        <div class="auth-links mt-3"><a href="{{ url_for('auth.admin_login') }}">Admin login</a><span>|</span><a href="{{ url_for('auth.register') }}">Create account</a></div>
    </div>
</section>
{% endblock %}
