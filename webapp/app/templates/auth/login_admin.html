{% extends "base.html" %}

{% block title %}Admin Login - Healthcare Risk Prediction Platform{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="auth-card auth-card-admin">
        <span class="eyebrow">Admin Login</span>
        <h1>Platform administration</h1>
        <p>Access user management, monitoring, analytics, and system statistics.</p>
        <form method="POST" action="{{ url_for('auth.admin_login') }}" class="mt-4">
            <div class="mb-3"><label class="form-label" for="username">Username</label><input class="form-control form-control-lg" id="username" name="username" required autofocus></div>
            <div class="mb-3"><label class="form-label" for="password">Password</label><input class="form-control form-control-lg" id="password" name="password" type="password" required></div>
            <button class="btn btn-primary btn-lg w-100" type="submit">Admin Sign In</button>
        </form>
        <div class="auth-links mt-3"><a href="{{ url_for('auth.user_login') }}">User login</a><span>|</span><a href="{{ url_for('main.help_center') }}">Help center</a></div>
    </div>
</section>
{% endblock %}
